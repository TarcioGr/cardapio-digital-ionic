<ion-header class="ion-no-border">
  <ion-toolbar color="danger">
    <ion-buttons slot="start"><ion-menu-button></ion-menu-button></ion-buttons>
    <ion-title style="font-weight: 800;">TG Burguer</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="abrirCarrinho()">
        <ion-icon slot="icon-only" name="cart-outline"></ion-icon>
        <ion-badge color="warning" *ngIf="carrinhoService.getTotalItens() > 0" style="position: absolute; top: 0; right: 0;">
          {{ carrinhoService.getTotalItens() }}
        </ion-badge>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding" style="--background: #121212;">
  <h2 style="color: white; font-weight: 800;">Ofertas <span style="color: var(--ion-color-danger);">Imperdíveis</span></h2>
  
  <ion-card *ngFor="let p of promocoes" style="margin: 0 0 20px 0; border-radius: 15px; background: #1e1e1e;">
    <div style="position: relative;">
      <img [src]="p.img" style="height: 180px; width: 100%; object-fit: cover;" />
      <ion-badge color="warning" style="position: absolute; top: 10px; left: 10px; color: #000; font-weight: 800;">{{ p.tag }}</ion-badge>
    </div>
    <ion-card-header>
      <ion-card-title style="color: white; font-weight: 700;">{{ p.titulo }}</ion-card-title>
      <ion-card-subtitle style="color: #888;">{{ p.subtitulo }}</ion-card-subtitle>
    </ion-card-header>
    <ion-card-content>
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <span style="color: #2dd36f; font-size: 1.3rem; font-weight: 800;">R$ {{ p.preco.toFixed(2) }}</span>
        <ion-button (click)="adicionar(p)" color="danger" style="font-weight: 700;">ADICIONAR</ion-button>
      </div>
    </ion-card-content>
  </ion-card>
</ion-content>
