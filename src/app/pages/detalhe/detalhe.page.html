<ion-header class="ion-no-border">
  <ion-toolbar transparent>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/home" color="light" style="background: rgba(0,0,0,0.4); border-radius: 50%;"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content fullscreen>
  <!-- Imagem Principal com verificação -->
  <div style="width: 100%; height: 35vh; overflow: hidden; background: #222;">
    <img [src]="produto?.img" *ngIf="produto?.img" style="width: 100%; height: 100%; object-fit: cover;" />
  </div>

  <!-- Container de Informações -->
  <div style="margin-top: -30px; background: white; border-top-left-radius: 30px; border-top-right-radius: 30px; padding: 25px; min-height: 70vh; position: relative;">
    
    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
      <div>
        <h1 style="font-weight: 800; font-size: 1.8rem; margin: 0; color: #333;">{{ produto?.nome }}</h1>
        <p style="color: #666; text-transform: uppercase; font-size: 0.8rem; font-weight: 600; margin-top: 5px;">
          Categoria: {{ produto?.categoria }}
        </p>
      </div>
      <ion-badge color="success" style="font-size: 1.2rem; padding: 10px; border-radius: 12px;">
        R$ {{ produto?.preco?.toFixed(2) }}
      </ion-badge>
    </div>

    <div style="margin-top: 30px;">
      <h3 style="font-weight: 700; color: #333;">Descrição</h3>
      <p style="line-height: 1.6; color: #555; font-size: 1.1rem;">
        {{ produto?.desc }}
      </p>
    </div>

    <div style="margin-top: 30px; display: flex; gap: 20px;">
       <div style="background: #f4f4f4; padding: 15px; border-radius: 15px; text-align: center; flex: 1;">
         <ion-icon name="time-outline" style="font-size: 1.5rem; color: var(--ion-color-danger);"></ion-icon>
         <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #666;">Preparo</p>
         <strong style="font-size: 0.9rem; color: #333;">20-30 min</strong>
       </div>
       <div style="background: #f4f4f4; padding: 15px; border-radius: 15px; text-align: center; flex: 1;">
         <ion-icon name="flame-outline" style="font-size: 1.5rem; color: var(--ion-color-danger);"></ion-icon>
         <p style="margin: 5px 0 0 0; font-size: 0.8rem; color: #666;">Calorias</p>
         <strong style="font-size: 0.9rem; color: #333;">650 kcal</strong>
       </div>
    </div>

    <div style="margin-top: 50px;">
      <ion-button expand="block" color="danger" size="large" style="--border-radius: 18px; font-weight: 800; height: 60px;" (click)="adicionarAoCarrinho()">
          ADICIONAR AO PEDIDO
      </ion-button>
    </div>
  </div>
</ion-content>
